server:
  port: 8765

spring:
  application:
    name: api-gateway

  main:
    allow-bean-definition-overriding: true

  profiles:
    active: local

  # Redis — used by the gateway rate limiter
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      # Global CORS config (use allowedOriginPatterns when allowCredentials=true)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 1800

      # Service discovery (Eureka) locator
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Global rate limiter applied to ALL routes
      # Uses Redis token-bucket algorithm via userKeyResolver bean
      default-filters:
        - name: RequestRateLimiter
          args:
            # Steady-state: 10 requests/second per user/IP
            redis-rate-limiter.replenishRate: 10
            # Allow a short burst of up to 20 requests
            redis-rate-limiter.burstCapacity: 20
            # Each request costs 1 token
            redis-rate-limiter.requestedTokens: 1
            # Bean name of the KeyResolver defined in AppConfig
            key-resolver: "#{@userKeyResolver}"

      # Routes for downstream services
      routes:
        - id: auth-service
          uri: lb://SERVICE-AUTH
          predicates:
            - Path=/service-auth/**
        - id: user-service
          uri: lb://SERVICE-USER
          predicates:
            - Path=/service-user/**
        - id: product-service
          uri: lb://SERVICE-PRODUCT
          predicates:
            - Path=/service-product/**
        - id: service-ml
          uri: lb://service-ml
          predicates:
            - Path=/service-ml/**
        - id: cart-service
          uri: lb://SERVICE-CART
          predicates:
            - Path=/service-cart/**
        - id: email-service
          uri: lb://SERVICE-EMAIL
          predicates:
            - Path=/service-email/**

      # HTTP client timeouts
      httpclient:
        connect-timeout: 30000
        response-timeout: 30s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
